<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f3460" />
  <meta name="description" content="Calculate your age in the Islamic Hijri calendar. كم عمرك بالهجري؟" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hijri Age" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Hijri Age Calculator</title>

  <!-- Facebook Instant Games SDK -->
  <script src="https://connect.facebook.net/en_US/fbinstant.6.3.js"></script>

  <style>
    :root {
      --gold: #ffd700;
      --orange: #ff9500;
      --bg1: #1a1a2e;
      --bg2: #16213e;
      --bg3: #0f3460;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,215,0,0.18);
      --text: rgba(255,255,255,0.9);
      --muted: rgba(255,255,255,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 40%, var(--bg3) 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 90%, rgba(255,255,255,0.4) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }
    #app {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
    }

    /* Language selector */
    .lang-bar {
      display: flex; flex-wrap: wrap; gap: 6px;
      justify-content: center; margin-bottom: 16px;
    }
    .lang-btn {
      padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.06); color: var(--muted);
      font-size: 0.72rem; cursor: pointer; transition: all 0.2s;
    }
    .lang-btn.active, .lang-btn:hover {
      background: rgba(255,215,0,0.15); color: var(--gold);
      border-color: var(--gold);
    }

    /* Header */
    .moon-wrap { text-align: center; margin-bottom: 6px; }
    .moon {
      font-size: 60px; display: inline-block;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 16px rgba(255,215,0,0.6));
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }
    h1 {
      text-align: center; color: var(--gold);
      font-size: 1.45rem; font-weight: 700; letter-spacing: 1px;
      margin-bottom: 4px; text-shadow: 0 0 20px rgba(255,215,0,0.4);
    }
    .subtitle {
      text-align: center; color: var(--muted);
      font-size: 0.85rem; margin-bottom: 22px;
    }

    /* Card */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 24px; padding: 28px 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    label {
      display: block; color: rgba(255,255,255,0.8);
      font-size: 0.9rem; margin-bottom: 10px; font-weight: 500;
    }
    input[type="date"] {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: 1.5px solid rgba(255,215,0,0.3);
      background: rgba(255,255,255,0.08); color: #fff;
      font-size: 1.05rem; outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      -webkit-appearance: none; color-scheme: dark;
    }
    input[type="date"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(255,215,0,0.15);
    }
    .btn {
      width: 100%; margin-top: 18px; padding: 16px;
      border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--gold), var(--orange));
      color: #1a1a2e; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255,149,0,0.4);
    }
    .btn:active { transform: scale(0.97); }
    .btn:hover  { box-shadow: 0 6px 28px rgba(255,149,0,0.55); }

    /* Result */
    .result { display: none; margin-top: 24px; text-align: center; }
    .result.show { display: block; }
    .result-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; margin-bottom: 16px;
    }
    .unit-box {
      background: rgba(255,215,0,0.08);
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 14px; padding: 14px 6px;
    }
    .unit-value {
      font-size: 2rem; font-weight: 800; color: var(--gold);
      line-height: 1; display: block;
      text-shadow: 0 0 12px rgba(255,215,0,0.5);
    }
    .unit-label {
      font-size: 0.68rem; color: var(--muted); margin-top: 4px;
      display: block; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .date-row {
      background: rgba(255,255,255,0.05); border-radius: 12px;
      padding: 12px 16px; margin-bottom: 12px; text-align: start;
    }
    .date-row .row-label {
      font-size: 0.7rem; color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .date-row .row-value { font-size: 0.95rem; color: var(--text); font-weight: 500; }
    .fun-fact {
      margin-top: 12px; background: rgba(255,215,0,0.06);
      border-inline-start: 3px solid var(--gold);
      border-radius: 0 10px 10px 0; padding: 10px 14px;
      font-size: 0.8rem; color: rgba(255,255,255,0.65);
      line-height: 1.5; text-align: start;
    }
    .fun-fact strong { color: var(--gold); }
    hr.divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 18px 0; }
    .share-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: #1877f2; color: #fff; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .share-btn:hover { background: #1465d6; }
    .install-btn {
      width: 100%; padding: 13px; border-radius: 12px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.06); color: var(--gold);
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s; margin-top: 10px;
      display: none; align-items: center; justify-content: center; gap: 8px;
    }
    .install-btn.visible { display: flex; }
    .reset-link {
      display: block; text-align: center; color: rgba(255,215,0,0.6);
      font-size: 0.82rem; cursor: pointer; margin-top: 14px;
      text-decoration: underline;
    }
    .reset-link:hover { color: var(--gold); }

    /* RTL support */
    [dir="rtl"] .fun-fact { border-radius: 10px 0 0 10px; }
  </style>
</head>
<body>
<div id="app" style="display:none">

  <!-- Language bar -->
  <div class="lang-bar" id="langBar"></div>

  <div class="moon-wrap"><span class="moon">&#9770;&#65039;</span></div>
  <h1 id="t-title">Hijri Age Calculator</h1>
  <p class="subtitle" id="t-subtitle"></p>

  <div class="card">
    <div id="inputSection">
      <label for="dob" id="t-label"></label>
      <input type="date" id="dob" />
      <button class="btn" onclick="calculate()" id="t-btn"></button>
    </div>

    <div class="result" id="resultSection">
      <div class="result-grid">
        <div class="unit-box">
          <span class="unit-value" id="hijriYears">0</span>
          <span class="unit-label" id="t-years"></span>
        </div>
        <div class="unit-box">
          <span class="unit-value" id="hijriMonths">0</span>
          <span class="unit-label" id="t-months"></span>
        </div>
        <div class="unit-box">
          <span class="unit-value" id="hijriDays">0</span>
          <span class="unit-label" id="t-days"></span>
        </div>
      </div>

      <div class="date-row">
        <div class="row-label" id="t-birth-label"></div>
        <div class="row-value" id="hijriBirth"></div>
      </div>
      <div class="date-row">
        <div class="row-label" id="t-today-label"></div>
        <div class="row-value" id="hijriToday"></div>
      </div>

      <div class="fun-fact" id="funFact"></div>
      <hr class="divider" />

      <button class="share-btn" onclick="shareResult()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.791-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
        </svg>
        <span id="t-share"></span>
      </button>

      <button class="install-btn" id="installBtn" onclick="installApp()">
        <span>&#11015;&#65039;</span> <span id="t-install"></span>
      </button>

      <span class="reset-link" onclick="resetForm()" id="t-reset"></span>
    </div>
  </div>
</div>

  bn: ['মুহাররম','সফর','রবিউল আউয়াল','রবিউস সানি','জুমাদাল উলা','জুমাদাল উখরা','রজব','শাবান','রমজান','শাওয়াল','জিলকদ','জিলহজ'],
  hi: ['मुहर्रम','सफर','रबी उल-अव्वल','रबी उस-सानी','जुमादा उल-उला','जुमादा उस-सानी','रजब','शाबान','रमजान','शव्वाल','ज़ुल-क़ादा','ज़ुल-हिज्जा']
};
function getMonths(lang) { return HIJRI_MONTHS[lang] || HIJRI_MONTHS.en; }

// ── Language management ───────────────────────────────────────────────────────
var currentLang = 'en';

function detectLang() {
  var nav = navigator.language || 'en';
  var code = nav.split('-')[0].toLowerCase();
  return LANGS[code] ? code : 'en';
}

function setLang(code) {
  currentLang = code;
  var L = LANGS[code];
  document.documentElement.lang = code;
  document.documentElement.dir = L.dir;
  document.getElementById('t-title').textContent     = L.title;
  document.getElementById('t-subtitle').textContent  = L.subtitle;
  document.getElementById('t-label').textContent     = L.label;
  document.getElementById('t-btn').textContent       = L.btn;
  document.getElementById('t-years').textContent     = L.years;
  document.getElementById('t-months').textContent    = L.months;
  document.getElementById('t-days').textContent      = L.days;
  document.getElementById('t-birth-label').textContent = L.birthLabel;
  document.getElementById('t-today-label').textContent = L.todayLabel;
  document.getElementById('t-share').textContent     = L.share;
  document.getElementById('t-install').textContent   = L.install;
  document.getElementById('t-reset').textContent     = L.reset;
  // Update active lang button
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.lang === code);
  });
  // Re-render result if visible
  if (document.getElementById('resultSection').classList.contains('show')) {
    renderResult();
  }
  localStorage.setItem('hijri_lang', code);
}

function buildLangBar() {
  var bar = document.getElementById('langBar');
  Object.keys(LANGS).forEach(function(code) {
    var btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.dataset.lang = code;
    btn.textContent = LANGS[code].name;
    btn.onclick = function() { setLang(code); };
    bar.appendChild(btn);
  });
}

// ── Hijri conversion ──────────────────────────────────────────────────────────
function gregorianToHijri(gy, gm, gd) {
  var jd = Math.floor((1461*(gy+4800+Math.floor((gm-14)/12)))/4)
          + Math.floor((367*(gm-2-12*Math.floor((gm-14)/12)))/12)
          - Math.floor((3*(Math.floor((gy+4900+Math.floor((gm-14)/12))/100)))/4)
          + gd - 32075;
  var l = jd - 1948440 + 10632;
  var n = Math.floor((l-1)/10631);
  l = l - 10631*n + 354;
  var j = Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)
        + Math.floor(l/5670)*Math.floor((43*l)/15238);
  l = l - Math.floor((30-j)/15)*Math.floor((17719*j)/50)
      - Math.floor(j/16)*Math.floor((15238*j)/43) + 29;
  var hm = Math.floor((24*l)/709);
  var hd = l - Math.floor((709*hm)/24);
  var hy = 30*n + j - 30;
  return { year:hy, month:hm, day:hd };
}

function hijriDiff(birth, today) {
  var years  = today.year  - birth.year;
  var months = today.month - birth.month;
  var days   = today.day   - birth.day;
  if (days < 0)   { months -= 1; days   += 30; }
  if (months < 0) { years  -= 1; months += 12; }
  return { years:years, months:months, days:days };
}

var todayG = new Date();
var lastBirth = null;

function calculate() {
  var val = document.getElementById('dob').value;
  var L = LANGS[currentLang];
  if (!val) { alert(L.alert); return; }
  var parts = val.split('-');
  var y = parseInt(parts[0]), m = parseInt(parts[1]), d = parseInt(parts[2]);
  if (new Date(y, m-1, d) >= todayG) { alert(L.pastAlert); return; }
  lastBirth = {y:y, m:m, d:d};
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('resultSection').classList.add('show');
  renderResult();
}

function renderResult() {
  if (!lastBirth) return;
  var L = LANGS[currentLang];
  var months = getMonths(currentLang);
  var birthH = gregorianToHijri(lastBirth.y, lastBirth.m, lastBirth.d);
  var todayH  = gregorianToHijri(todayG.getFullYear(), todayG.getMonth()+1, todayG.getDate());
  var age    = hijriDiff(birthH, todayH);

  document.getElementById('hijriYears').textContent  = age.years;
  document.getElementById('hijriMonths').textContent = age.months;
  document.getElementById('hijriDays').textContent   = age.days;
  document.getElementById('hijriBirth').textContent  = birthH.day + ' ' + months[birthH.month-1] + ' ' + birthH.year + ' AH';
  document.getElementById('hijriToday').textContent  = todayH.day  + ' ' + months[todayH.month-1]  + ' ' + todayH.year  + ' AH';

  var totalDays = Math.round((todayG - new Date(lastBirth.y, lastBirth.m-1, lastBirth.d)) / 86400000 * (354.37/365.25));
  var fact = L.fact.replace('%d', totalDays.toLocaleString());
  if (age.years >= 40) fact += ' ' + L.proverb;
  document.getElementById('funFact').innerHTML = fact;
}

function resetForm() {
  lastBirth = null;
  document.getElementById('inputSection').style.display = '';
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('dob').value = '';
}

function shareResult() {
  var L = LANGS[currentLang];
  var years  = document.getElementById('hijriYears').textContent;
  var months = document.getElementById('hijriMonths').textContent;
  var days   = document.getElementById('hijriDays').textContent;
  var msg = years + ' ' + L.years + ', ' + months + ' ' + L.months + ', ' + days + ' ' + L.days + ' | ' + L.title;
  try {
    FBInstant.shareAsync({ intent:'CHALLENGE', text: msg, data:{hijriAge:years} });
  } catch(e) {
    var url = encodeURIComponent(window.location.href);
    window.open('https://www.facebook.com/sharer/sharer.php?u='+url+'&quote='+encodeURIComponent(msg),'_blank');
  }
}

// ── PWA Install prompt ────────────────────────────────────────────────────────
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').classList.add('visible');
});
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function() { deferredPrompt = null; });
  }
}

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildLangBar();
var savedLang = localStorage.getItem('hijri_lang') || detectLang();
setLang(savedLang);
document.getElementById('dob').max = todayG.toISOString().split('T')[0];
document.getElementById('app').style.display = '';

if (typeof FBInstant !== 'undefined') {
  FBInstant.initializeAsync().then(function() {
    return FBInstant.startGameAsync();
  }).catch(function(){});
}
</script>
